<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log Notes Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      transition: background 0.5s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom right, #f0f4f8, #d9e2ec);
      padding: 20px;
      margin: 0;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      padding: 30px;
      max-width: 650px;
      width: 100%;
      margin: auto;
      overflow: hidden;
    }

    img.logo {
      max-width: 200px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto 20px auto;
    }

    h2 {
      text-align: center;
      color: #333;
      font-size: 1.8em;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #222;
    }

    textarea {
      width: 100%;
      min-height: 42px;
      max-height: none;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: inherit;
      font-size: 1em;
      line-height: 1.4;
      resize: none;
      overflow-y: hidden;
      overflow-x: hidden;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      display: block;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
      color: white;
    }

    .copy-button {
      background-color: #4CAF50;
    }

    .copy-button:hover {
      background-color: #45a049;
    }

    .clear-button {
      background-color: #e53935;
    }

    .clear-button:hover {
      background-color: #d7372f;
    }

    .history-button {
      background-color: #f4b400;
    }

    .history-button:hover {
      background-color: #d99f00;
    }

    .output-box {
      margin-top: 20px;
      background: #eef;
      padding: 15px;
      border-radius: 6px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      max-width: 100%;
      display: none;
    }

    .history-entry {
      margin-top: 8px;
      padding: 8px;
      background: #fff;
      border-left: 4px solid #ccc;
      border-radius: 4px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      max-width: 100%;
    }

    details {
      transition: all 0.3s ease;
      overflow: hidden;
      margin-top: 30px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      background-color: #f1f1f1;
      max-width: 100%;
    }

    summary {
      list-style: none;
      position: relative;
      padding-left: 1.2em;
      cursor: pointer;
    }

    summary::before {
      content: '\25B6';
      position: absolute;
      left: 0;
      transition: transform 0.3s ease;
    }

    details[open] summary::before {
      transform: rotate(90deg);
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 20px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="occ-logo.jpg" alt="OCC Logo" class="logo">
    <h2>COPS Log Notes Generator</h2>

    <div class="form-group"><label for="initialsTime">Initials and Time (Z) *</label><textarea id="initialsTime" rows="1"></textarea></div>
    <div class="form-group"><label for="callerName">Caller/Base Name *</label><textarea id="callerName" rows="1"></textarea></div>
    <div class="form-group"><label for="reasonCall">Reason for Call *</label><textarea id="reasonCall" rows="1"></textarea></div>
    <div class="form-group"><label for="pnr">PNR</label><textarea id="pnr" rows="1"></textarea></div>
    <div class="form-group"><label for="actionTaken">Action Taken</label><textarea id="actionTaken" rows="1"></textarea></div>
    <div class="form-group"><label for="adviceGiven">Advice Given</label><textarea id="adviceGiven" rows="1"></textarea></div>
    <div class="form-group"><label for="voicemail">Voicemail Left</label><textarea id="voicemail" rows="1"></textarea></div>
    <div class="form-group"><label for="adminFees">Admin Fees</label><textarea id="adminFees" rows="1"></textarea></div>
    <div class="form-group"><label for="flightDelay">Flight Delay</label><textarea id="flightDelay" rows="1"></textarea></div>
    <div class="form-group"><label for="cilIssued">CIL Issued</label><textarea id="cilIssued" rows="1"></textarea></div>
    <div class="form-group"><label for="welfareIssued">Welfare Issued</label><textarea id="welfareIssued" rows="1"></textarea></div>
    <div class="form-group"><label for="paymentTaken">Payment Taken</label><textarea id="paymentTaken" rows="1"></textarea></div>
    <div class="form-group"><label for="reasonPayment">Reason for Payment</label><textarea id="reasonPayment" rows="1"></textarea></div>

    <div class="button-group">
      <button type="button" class="copy-button" onclick="generateNotes()">Copy Notes to Clipboard</button>
      <button type="button" class="clear-button" onclick="clearForm()">Clear Form</button>
      <button type="button" class="history-button" onclick="toggleHistory()">Previous Notes</button>
    </div>

    <div class="output-box" id="output"></div>
    <div class="output-box" id="history"></div>

    <details>
      <summary>📋 View Changelog</summary>
      <ul>
        <li><strong>Version 3</strong> – Added expanding notes boxes and fixed previous notes wrapping.</li>
        <li><strong>Version 2</strong> – Added Clear Form button, removed clickable title, added Previous Notes history.</li>
        <li><strong>Version 1</strong> – Initial release of Log Notes Generator.</li>
      </ul>
    </details>
  </div>

  <script>
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderHistory() {
      const historyBox = document.getElementById('history');
      const history = JSON.parse(localStorage.getItem('clipboardHistory') || '[]');

      if (!history.length) {
        historyBox.innerHTML = '<strong>Previous Notes:</strong><br>No previous notes saved yet.';
        return;
      }

      historyBox.innerHTML = '<strong>Previous Notes:</strong>' +
        history.map(note => `<div class="history-entry">${escapeHtml(note)}</div>`).join('');
    }

    function generateNotes() {
      const get = id => document.getElementById(id).value.trim();
      const requiredFields = ['initialsTime', 'callerName', 'reasonCall'];

      for (const field of requiredFields) {
        if (!get(field)) {
          alert('Please fill in all required fields.');
          return;
        }
      }

      const fieldLabels = [
        ['callerName', 'Caller/Base Name'],
        ['reasonCall', 'Reason for Call'],
        ['pnr', 'PNR'],
        ['actionTaken', 'Action Taken'],
        ['adviceGiven', 'Advice Given'],
        ['voicemail', 'Voicemail Left'],
        ['adminFees', 'Admin Fees'],
        ['flightDelay', 'Flight Delay'],
        ['cilIssued', 'CIL Issued'],
        ['welfareIssued', 'Welfare Issued'],
        ['paymentTaken', 'Payment Taken'],
        ['reasonPayment', 'Reason for Payment']
      ];

      const lines = [get('initialsTime')].concat(
        fieldLabels.map(([id, label]) => {
          const value = get(id);
          return value ? `${label}: ${value}` : null;
        }).filter(Boolean)
      );

      const result = lines.join('\n');

      navigator.clipboard.writeText(result).then(() => {
        let history = JSON.parse(localStorage.getItem('clipboardHistory') || '[]');
        history.unshift(result);
        history = history.slice(0, 3);
        localStorage.setItem('clipboardHistory', JSON.stringify(history));

        renderHistory();

        const outputBox = document.getElementById('output');
        outputBox.style.display = 'block';
        outputBox.innerText = result;

        alert('Log notes copied to clipboard!');
      }).catch(() => {
        const outputBox = document.getElementById('output');
        outputBox.style.display = 'block';
        outputBox.innerText = result;
        alert('Clipboard copy failed. Your notes are shown below so you can copy them manually.');
      });
    }

    function clearForm() {
      document.querySelectorAll('textarea').forEach(textarea => {
        textarea.value = '';
        autoResize(textarea);
      });

      const output = document.getElementById('output');
      output.innerText = '';
      output.style.display = 'none';
    }

    function toggleHistory() {
      const history = document.getElementById('history');
      renderHistory();
      history.style.display = history.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('textarea').forEach(textarea => {
        autoResize(textarea);
        textarea.addEventListener('input', () => autoResize(textarea));
      });
    });
  </script>
</body>
</html>
